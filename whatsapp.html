<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Direct</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    background: #f0f2f5;
    color: #4b4b4b;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  .card {
    background: #fff;
    border-radius: 12px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    text-align: center;
  }

  .logo {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .description {
    font-size: 15px;
    color: #667781;
    line-height: 1.5;
    margin-bottom: 32px;
  }

  .hint {
    display: none;
    font-size: 13px;
    color: #a0aeb6;
    margin-top: 8px;
  }

  @media (min-width: 1000px) {
    .hint { display: block; }
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }

  label {
    display: block;
    font-size: 12px;
    color: #667781;
    text-align: left;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .code-field { width: 80px; flex-shrink: 0; }
  .phone-field { flex: 1; }

  input {
    width: 100%;
    padding: 10px 12px;
    font-size: 16px;
    border: 1.5px solid #d1d7db;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }

  input:focus {
    border-color: #00a884;
  }

  .prefix {
    position: relative;
  }

  .prefix input {
    padding-left: 24px;
  }

  .prefix::before {
    content: "+";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #667781;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: #00a884;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  button:hover:not(:disabled) {
    background: #008f72;
  }

  button:disabled {
    background: #d1d7db;
    cursor: not-allowed;
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">💬</div>
  <div class="description">
    Send WhatsApp messages without creating a new contact.
    <div class="hint">Open this URL on mobile to launch WhatsApp directly.</div>
  </div>

  <div class="input-row">
    <div class="code-field">
      <label for="country-code">Code</label>
      <div class="prefix">
        <input type="number" id="country-code" value="65">
      </div>
    </div>
    <div class="phone-field">
      <label for="phone-number">Phone</label>
      <input type="number" id="phone-number" autofocus>
    </div>
  </div>

  <button id="send-btn" disabled onclick="openWhatsApp()">
    Open in WhatsApp
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
  </button>
</div>

<script>
  const code = document.getElementById('country-code');
  const phone = document.getElementById('phone-number');
  const btn = document.getElementById('send-btn');

  function updateButton() {
    btn.disabled = code.value.trim() === '' || phone.value.trim() === '';
  }

  function openWhatsApp() {
    window.location = 'https://api.whatsapp.com/send?phone=' + code.value.trim() + phone.value.trim();
  }

  code.addEventListener('input', updateButton);
  phone.addEventListener('input', updateButton);
  phone.addEventListener('keypress', function(e) {
    if (e.key === 'Enter' && !btn.disabled) openWhatsApp();
  });
</script>

</body>
</html>
